<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسوية مديونية الطالب - {{ student.get_full_name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0 text-center">تسوية مديونية الطالب</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <p><strong>اسم الطالب:</strong> {{ student.get_full_name }}</p>
                        <p><strong>المديونية القديمة المتبقية:</strong> 
                            <span class="badge badge-warning p-2">{{ student.previous_debt }} ج.م</span>
                        </p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="amount">المبلغ المراد سداده:</label>
                            <input type="number" id="amount" name="amount" step="0.01" 
                                   max="{{ student.previous_debt }}" class="form-control" 
                                   placeholder="أدخل المبلغ..." required>
                        </div>
                        
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-success btn-lg px-4">تأكيد عملية السداد</button>
                            <a href="{% url 'student_statement_print' student.id %}" class="btn btn-secondary btn-lg px-4">إلغاء</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
