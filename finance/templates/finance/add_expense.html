{% extends 'base.html' %}
{% block title %}تسجيل مصروف نثري{% endblock %}

{% block content %}
<style>
    body { background-color: #0f172a; font-family: 'Cairo', sans-serif; }
    .expense-card {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .expense-header {
        background: rgba(0,0,0,0.2);
        border-bottom: 2px solid #f59e0b; /* Warning color for Petty */
        padding: 20px;
        border-radius: 16px 16px 0 0;
    }
    .dark-input {
        background-color: #0f172a !important;
        border: 1px solid #334155 !important;
        color: #fff !important;
    }
    .dark-input:focus {
        border-color: #f59e0b !important;
        box-shadow: 0 0 0 0.25rem rgba(245, 158, 11, 0.25) !important;
    }
</style>

<div class="container-fluid mt-5 mb-5 animate__animated animate__fadeInDown" dir="rtl">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="expense-card">
                <div class="expense-header">
                    <h4 class="mb-0 text-warning fw-bold">
                        <i class="bi bi-cup-hot-fill me-2"></i> تسجيل مصروف نثري / عام
                    </h4>
                </div>
                <div class="card-body p-4 p-md-5 text-white">
                    <form method="POST" action="{% url 'add_expense_view' %}" id="expenseForm">
                        {% csrf_token %}
                        <input type="hidden" name="expense_type" value="petty">
                        
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label text-info fw-bold">1. اختر بند المصروف <span class="text-white-50 fw-normal fs-6">(من القائمة)</span></label>
                                <select name="expense_item" id="id_expense_item" class="form-select dark-input form-select-lg">
                                    <option value="">-- اضغط للاختيار --</option>
                                    {% for item in expense_items %}
                                        <option value="{{ item.id }}">{{ item.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label text-warning fw-bold">أو اكتب بيان الصرف يدوياً <span class="text-white-50 fw-normal fs-6">(إذا لم تجده)</span></label>
                                <input type="text" name="title" id="id_title" class="form-control dark-input form-control-lg" placeholder="مثال: أدوات نظافة، بوفيه، إكراميات...">
                                <small class="text-danger d-none mt-1" id="titleError">يجب عليك اختيار بند من القائمة أو كتابة البيان هنا.</small>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label text-white-50 fw-bold">رقم الفاتورة <span class="fw-normal fs-6">(اختياري)</span></label>
                                <input type="text" name="invoice_number" class="form-control dark-input form-control-lg" placeholder="أدخل رقم الفاتورة أو الإيصال إن وجد">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label text-warning fw-bold">المبلغ (ج.م) <span class="text-danger">*</span></label>
                                <div class="input-group input-group-lg">
                                    <input type="number" step="0.01" min="1" name="amount" class="form-control dark-input text-start fw-bold fs-4" placeholder="0.00" required>
                                    <span class="input-group-text bg-dark text-warning border-secondary fw-bold">ج.م</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-12">
                                <label class="form-label text-white-50 fw-bold">ملاحظات إضافية <span class="fw-normal fs-6">(اختياري)</span></label>
                                <textarea name="notes" class="form-control dark-input" rows="2" placeholder="أضف أي تفاصيل أخرى هنا..."></textarea>
                            </div>
                        </div>
                        
                        <div class="row mt-5">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow">
                                    <i class="bi bi-check-circle-fill me-2"></i> حفظ المصروف النثري
                                </button>
                            </div>
                            <div class="col-md-6">
                                {% if next_url %}
                                    <input type="hidden" name="next" value="{{ next_url }}">
                                {% endif %}
                                <a href="{% if next_url %}{{ next_url }}{% else %}{% url 'daily_cashier_summary' %}{% endif %}" class="btn btn-outline-light btn-lg w-100 fw-bold">
                                    <i class="bi bi-arrow-return-right me-2"></i> إلغاء والعودة
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    // كود للتحقق من إدخال البيان (إما اختيار من القائمة أو كتابة يدوية)
    document.getElementById('expenseForm').addEventListener('submit', function(e) {
        const itemSelect = document.getElementById('id_expense_item').value;
        const titleInput = document.getElementById('id_title').value.trim();
        const errorMsg = document.getElementById('titleError');

        if (!itemSelect && !titleInput) {
            e.preventDefault(); // إيقاف إرسال الفورم
            errorMsg.classList.remove('d-none');
            document.getElementById('id_title').focus();
        } else {
            errorMsg.classList.add('d-none');
        }
    });

    // إخفاء رسالة الخطأ بمجرد أن يبدأ المستخدم في الكتابة أو الاختيار
    document.getElementById('id_expense_item').addEventListener('change', function() {
        document.getElementById('titleError').classList.add('d-none');
    });
    document.getElementById('id_title').addEventListener('input', function() {
        document.getElementById('titleError').classList.add('d-none');
    });
</script>
{% endblock %}
{% endblock %}
