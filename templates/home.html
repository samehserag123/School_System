{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>School Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #2563eb, #1e40af);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-card {
            border-radius: 25px;
            padding: 25px 20px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 420px;
            position: relative;
            color: #ffffff;
            z-index: 1;
        }

        .title {
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .title::after {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: #3b82f6;
            margin: 8px auto;
            border-radius: 10px;
        }

        .btn-custom {
            width: 100%;
            min-height: 44px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white !important;
            margin-bottom: 8px;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        /* تنسيق الألوان للأزرار */
        .btn-students { background: linear-gradient(45deg, #1e3a8a, #3b82f6); }
        .btn-add      { background: linear-gradient(45deg, #059669, #10b981); }
        .btn-plans    { background: linear-gradient(45deg, #b45309, #f59e0b); }
        .btn-courses  { background: linear-gradient(45deg, #7c3aed, #a78bfa); } /* لون أرجواني جديد للكورسات */
        .btn-debt     { background: linear-gradient(45deg, #e11d48, #fb7185); }
        .btn-finance  { background: linear-gradient(45deg, #d97706, #f59e0b); }
        .btn-treasury { background: linear-gradient(45deg, #92400e, #d97706); }
        .btn-close    { background: linear-gradient(45deg, #b91c1c, #ef4444); }
        .btn-admin    { background: linear-gradient(45deg, #334155, #64748b); }

        .bg-icon {
            position: absolute;
            font-size: 7rem;
            color: rgba(255,255,255,0.03);
            z-index: -1;
            top: -10px;
            left: -10px;
            transform: rotate(-15deg);
        }
    </style>
</head>
<body>

<div class="main-card text-center">
    <i class="bi bi-mortarboard bg-icon"></i>
    
    <h2 class="title">نظام إدارة المدرسة</h2>
    
    <div class="buttons-container">
        <a href="{% url 'student_list' %}" class="btn-custom btn-students">
            <i class="bi bi-people-fill"></i> إدارة الطلاب
        </a>
        
        <a href="{% url 'add_student' %}" class="btn-custom btn-add">
            <i class="bi bi-person-plus-fill"></i> إضافة طالب جديد
        </a>

        <a href="{% url 'book_sales_list' %}" class="btn-custom" style="background: linear-gradient(135deg, #6366f1, #4f46e5); color: white;">
            <i class="bi bi-book-half"></i> نظام صرف الكتب والزي
        </a>

        <a href="{% url 'admin_add_restock' %}" class="btn-custom" style="background: linear-gradient(135deg, #198754, #146c43); color: white;">
            <i class="bi bi-plus-square-fill"></i> إضافة وارد للمخزن (مدير)
        </a>

        <a href="{% url 'course_prices' %}" class="btn-custom btn-courses">
            <i class="bi bi-currency-exchange"></i> قائمة أسعار الكورسات
        </a>

        <a href="{% url 'installment_plan_list' %}" class="btn-custom btn-plans">
            <i class="bi bi-clipboard-data-fill"></i> إدارة أنظمة التقسيط
        </a>
        
        <a href="{% url 'debt_report' %}" class="btn-custom btn-debt">
            <i class="bi bi-exclamation-triangle-fill"></i> سجل مديونيات الطلاب
        </a>

        <a href="{% url 'finance_dashboard' %}" class="btn-custom btn-finance">
            <i class="bi bi-pie-chart-fill"></i> الداشبورد المالي
        </a>

        <a href="{% url 'daily_cashier_summary' %}" class="btn-custom btn-treasury">
            <i class="bi bi-safe2-fill"></i> جرد وإغلاق الخزينة اليومي
        </a>
        
        <a href="/admin/" class="btn-custom btn-admin">
            <i class="bi bi-shield-lock-fill"></i> لوحة التحكم (Admin)
        </a>
    </div>

    <div class="mt-3 pt-2 border-top border-light border-opacity-10">
        <p class="text-white text-opacity-50 mb-0 small fw-bold">نظام الإدارة المتكامل | 2026</p>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
