{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | نظام إدارة المدرسة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #1e40af, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .login-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            color: white;
            z-index: 100;
        }
        /* تعديل ألوان Crispy Forms لتظهر بوضوح */
        .mb-3 label { color: #0dcaf0 !important; font-weight: bold; }
        input.form-control { 
            background: rgba(255,255,255,0.1) !important; 
            color: white !important; 
            border: 1px solid #444 !important;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <i class="bi bi-shield-lock-fill text-info" style="font-size: 3.5rem;"></i>
        <h3 class="my-4 fw-bold">دخول النظام</h3>

        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            
            <button type="submit" class="btn btn-info w-100 py-2 mt-3 fw-bold shadow">
                <i class="bi bi-box-arrow-in-right"></i> تسجيل الدخول
            </button>
        </form>

        <div class="mt-4 small text-white-50">
            &copy; 2026 نظام الإدارة المتكامل
        </div>
    </div>

</body>
</html>
