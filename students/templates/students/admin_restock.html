{% extends "base.html" %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card bg-dark text-white border-success shadow-lg p-2">
                <div class="card-header bg-success bg-opacity-25 border-success py-3 rounded text-center">
                    <h4 class="mb-0 text-success fw-bold">
                        <i class="bi bi-box-arrow-in-down me-2"></i> تسجيل توريد كميات جديدة (للمدير)
                    </h4>
                </div>
                
                <div class="card-body p-4">
                    <form method="post" id="restockForm" class="needs-validation" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-info">
                                <i class="bi bi-search me-1"></i> اختر الصنف المراد تزويده:
                            </label>
                            <select name="item_id" class="form-select select2" required>
                                <option value="">--- ابحث عن كتاب أو زي مدرسي بالاسم ---</option>
                                {% for item in items %}
                                    <option value="{{ item.id }}">
                                        {% if item.item_type == 'book' %}
                                            📚 {{ item.subject.name }} - الصف: {{ item.grade.name }}
                                        {% else %}
                                            👕 {{ item.uniform.name }} - الصف: {{ item.grade.name }}
                                        {% endif %}
                                        (الرصيد: {{ item.stock_quantity }})
                                    </option>
                                {% endfor %}
                            </select>
                            <div class="invalid-feedback text-warning">يرجى اختيار صنف من القائمة.</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-info"><i class="bi bi-plus-circle me-1"></i> الكمية الموردة:</label>
                                {{ form.quantity }}
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-info"><i class="bi bi-pencil me-1"></i> ملاحظات التوريد:</label>
                                {{ form.note }}
                            </div>
                        </div>

                        <hr class="border-secondary opacity-25">

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm">
                                <i class="bi bi-check-all me-2"></i> تأكيد وحفظ في المخزن
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-lg px-4">إلغاء</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .select2-container--bootstrap-5 .select2-selection {
        background-color: #1a1d20 !important;
        color: #0dcaf0 !important;
        border: 1px solid #495057 !important;
        height: 50px !important;
        line-height: 50px !important;
    }
    .select2-container--bootstrap-5 .select2-selection__rendered {
        color: #0dcaf0 !important;
        line-height: 48px !important;
    }
    .select2-dropdown {
        background-color: #1a1d20 !important;
        color: white !important;
        border: 1px solid #198754 !important;
    }
    .select2-results__option { color: white !important; }
    .select2-results__option--highlighted { background-color: #198754 !important; }
    .select2-search__field { background-color: #2b3035 !important; color: white !important; }
</style>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    $(document).ready(function() {
        // تفعيل Select2 مع الثيم الخاص بـ Bootstrap 5
        $('.select2').select2({
            theme: 'bootstrap-5',
            width: '100%',
            language: {
                noResults: function() { return "لا يوجد نتائج مطابقة"; }
            }
        });

        // التحقق من صحة النموذج
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    });
</script>
{% endblock %}
