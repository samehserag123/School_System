{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحصيل رسوم - {{ enrollment.student }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #2563eb, #1e40af);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .payment-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%; max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            color: white;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px; margin-bottom: 20px;
            border-right: 4px solid #3b82f6;
        }
        .btn-confirm {
            background: linear-gradient(45deg, #10b981, #059669);
            border: none; border-radius: 12px; font-weight: bold; padding: 12px;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <h3 class="text-center mb-4"><i class="bi bi-cash-coin text-warning"></i> تحصيل رسوم</h3>
    
    <div class="info-box">
        <div class="small text-white-50">الطالب:</div>
        <div class="fw-bold fs-5">{{ enrollment.student }}</div>
    </div>
    
    <div class="row mb-3">
        <div class="col-6">
            <div class="info-box">
                <div class="small text-white-50">المادة:</div>
                <div class="fw-bold">{{ enrollment.course_info.subject.name }}</div>
            </div>
        </div>
        <div class="col-6">
            <div class="info-box border-warning">
                <div class="small text-white-50">المتبقي:</div>
                <div class="fw-bold text-warning">{{ enrollment.remaining_amount }} ج.م</div>
            </div>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-bold">المبلغ المطلوب دفعه الآن:</label>
            <input type="number" name="amount_paid" class="form-control form-control-lg bg-dark text-white border-primary" 
                   max="{{ enrollment.remaining_amount }}" step="0.5" required placeholder="0.00">
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold small">ملاحظات التحصيل:</label>
            <textarea name="notes" class="form-control bg-dark text-white border-secondary" rows="2"></textarea>
        </div>
        
        <button type="submit" class="btn btn-confirm w-100 text-white shadow">
            تأكيد التحصيل وإصدار إيصال <i class="bi bi-printer ms-2"></i>
        </button>
        
        <a href="{% url 'course_prices' %}" class="btn btn-link w-100 text-white-50 mt-2 text-decoration-none">إلغاء والعودة</a>
    </form>
</div>

</body>
</html>
