<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع ملف البصمة</title>
    <!-- استخدام Bootstrap لتنسيق الصفحة -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">تحليل بصمة الموظفين وإصدار المرتبات</h4>
                    </div>
                    <div class="card-body">
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                        
                        <p class="text-muted">الرجاء رفع ملف إكسيل يحتوي على الأعمدة التالية: <strong>EmpID, Date, CheckIn, CheckOut</strong></p>
                        
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="mb-3">
                                {{ form.as_p }}
                            </div>
                            <button type="submit" class="btn btn-success w-100">تحليل واستخراج كشف المرتبات</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
