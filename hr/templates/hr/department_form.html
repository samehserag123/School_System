{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light">
    <!-- شريط التنقل العلوي -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'hr:employee_list' %}">نظام الـ HR</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'hr:employee_list' %}">قائمة الموظفين</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{% url 'hr:department_list' %}">إدارة الأقسام</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white"><h4 class="mb-0">{{ title }}</h4></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">حفظ البيانات</button>
                        <a href="{% url 'hr:department_list' %}" class="btn btn-secondary">إلغاء والعودة</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
