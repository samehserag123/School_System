{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <!-- شريط التنقل العلوي -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'hr:employee_list' %}"><i class="fas fa-users"></i> نظام الـ HR</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'hr:employee_list' %}">قائمة الموظفين</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'hr:department_list' %}">إدارة الأقسام</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'hr:calculate_payroll' %}">معالجة البصمة والمرتبات</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-user-edit"></i> {{ title }}</h4>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <!-- استخدام crispy forms لتنسيق الفورم تلقائياً -->
                            {{ form|crispy }}
                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-success px-4"><i class="fas fa-save"></i> حفظ البيانات</button>
                                <a href="{% url 'hr:employee_list' %}" class="btn btn-secondary"><i class="fas fa-times"></i> إلغاء والعودة</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
